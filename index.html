<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kütüphanecim</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg:    #0a0907;
  --bg2:   #111009;
  --bg3:   #1a1610;
  --bg4:   #221e14;
  --brd:   #2e2818;
  --brd2:  #3d3420;
  --gold:  #c9a84c;
  --gold2: #e8c97a;
  --txt:   #e8dcc8;
  --txt2:  #c4b89a;
  --txt3:  #8a7d64;
  --txt4:  #5a5040;
  --green: #5a9a6a;
  --red:   #9a4a4a;
  --blue:  #4a7a9a;
  --ff:    'Inter', sans-serif;
  --ffh:   'Playfair Display', serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--txt); font-family:var(--ff); min-height:100vh; }

/* HEADER */
#header {
  background: linear-gradient(180deg, #16120a, #0e0c07);
  border-bottom: 1px solid var(--brd);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}
#logo {
  font-family: var(--ffh);
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1px;
  font-style: italic;
}
#logo span { color: var(--txt3); font-size: 11px; display: block; font-family: var(--ff); font-style: normal; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
#stats-bar { display: flex; gap: 24px; }
.stat-item { text-align: center; }
.stat-n { font-family: var(--ffh); font-size: 22px; color: var(--gold); font-weight: 900; line-height: 1; }
.stat-l { font-size: 9px; color: var(--txt4); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
#header-actions { display: flex; gap: 8px; }

/* NAV */
#nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--brd);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
}
#nav::-webkit-scrollbar { display: none; }
.nav-item {
  padding: 12px 20px;
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--txt3);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .2s;
  font-weight: 500;
}
.nav-item:hover { color: var(--txt2); background: var(--bg3); }
.nav-item.act { color: var(--gold); border-bottom-color: var(--gold); }

/* MAIN */
#main { }
.tab { display: none; }
.tab.act { display: block; }

/* BUTTONS */
.btn {
  padding: 8px 16px;
  border: 1px solid var(--brd2);
  background: var(--bg3);
  color: var(--txt2);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--ff);
  transition: all .15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn.primary { background: var(--gold); color: #0a0907; border-color: var(--gold); font-weight: 600; }
.btn.primary:hover { background: var(--gold2); }
.btn.danger { border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: var(--red); color: #fff; }

/* INPUTS */
input, select, textarea {
  background: var(--bg3);
  border: 1px solid var(--brd2);
  color: var(--txt);
  padding: 8px 12px;
  border-radius: 6px;
  font-family: var(--ff);
  font-size: 13px;
  outline: none;
  transition: border .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--gold); }
select option { background: var(--bg3); }

/* LIBRARY TAB */
#lib-toolbar {
  padding: 16px 24px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--brd);
  background: var(--bg2);
}
#search { width: 220px; }
#lib-content { padding: 20px 24px; }

/* SHELF GRID */
#shelf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 16px;
}
.book-card {
  background: var(--bg3);
  border: 1px solid var(--brd);
  border-radius: 8px;
  padding: 12px 10px 10px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.book-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
.book-cover {
  width: 80px;
  height: 110px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--ffh);
  font-size: 32px;
  font-weight: 900;
  color: var(--gold);
  background: var(--bg4);
  border: 1px solid var(--brd2);
  flex-shrink: 0;
  overflow: hidden;
}
.book-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
.book-title {
  font-size: 11px;
  color: var(--txt2);
  text-align: center;
  line-height: 1.4;
  font-family: var(--ffh);
  font-style: italic;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  width: 100%;
}
.book-author { font-size: 10px; color: var(--txt4); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
.status-dot {
  position: absolute;
  top: 7px;
  right: 7px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* LIST VIEW */
#list-view { width: 100%; border-collapse: collapse; }
#list-view th {
  background: var(--bg3);
  color: var(--txt3);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--brd);
  cursor: pointer;
  white-space: nowrap;
}
#list-view th:hover { color: var(--gold); }
#list-view td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--brd);
  font-size: 13px;
  color: var(--txt2);
  vertical-align: middle;
}
#list-view tr:hover td { background: var(--bg3); }
#list-view td:first-child { font-family: var(--ffh); font-style: italic; color: var(--txt); }

/* BADGE */
.bdg {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 500;
  border: 1px solid;
}
.star { color: var(--gold); font-size: 12px; }

/* MODAL */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal {
  background: var(--bg2);
  border: 1px solid var(--brd2);
  border-radius: 12px;
  padding: 28px;
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h2 { font-family: var(--ffh); font-size: 20px; color: var(--txt); font-style: italic; margin-bottom: 20px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; font-size: 11px; color: var(--txt3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
.form-row input, .form-row select, .form-row textarea { width: 100%; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

/* STATS TAB */
#stats-content { padding: 24px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card {
  background: var(--bg3);
  border: 1px solid var(--brd);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
}
.stat-card .big { font-family: var(--ffh); font-size: 36px; font-weight: 900; color: var(--gold); line-height: 1; }
.stat-card .lbl { font-size: 11px; color: var(--txt4); text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }
.section-title { font-family: var(--ffh); font-size: 16px; color: var(--gold); margin-bottom: 16px; font-style: italic; }
.author-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--brd); }
.author-rank { font-size: 11px; color: var(--txt4); width: 20px; }
.author-name { flex: 1; font-size: 13px; color: var(--txt2); }
.author-count { font-weight: 700; color: var(--gold); font-size: 15px; font-family: var(--ffh); }
.pbar { flex-shrink: 0; width: 80px; height: 4px; background: var(--bg4); border-radius: 2px; }
.pfill { height: 100%; background: var(--gold); border-radius: 2px; }
.tur-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.tur-item { background: var(--bg3); border: 1px solid var(--brd); border-radius: 8px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
.tur-name { font-size: 13px; color: var(--txt2); }
.tur-n { font-family: var(--ffh); font-size: 18px; color: var(--gold); font-weight: 700; }

/* BADGES TAB */
#badges-content { padding: 24px; }
.badges-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.badge-card {
  background: var(--bg3);
  border: 1px solid var(--brd);
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  transition: all .2s;
}
.badge-card.earned { border-color: var(--gold); background: linear-gradient(135deg, #1a1610, #221e12); }
.badge-icon { font-size: 36px; margin-bottom: 10px; filter: grayscale(1) opacity(.3); }
.badge-card.earned .badge-icon { filter: none; }
.badge-name { font-family: var(--ffh); font-size: 14px; color: var(--txt3); font-style: italic; }
.badge-card.earned .badge-name { color: var(--gold); }
.badge-desc { font-size: 11px; color: var(--txt4); margin-top: 4px; }

/* DETAIL MODAL */
.detail-header { display: flex; gap: 20px; margin-bottom: 20px; }
.detail-cover { width: 80px; height: 112px; border-radius: 6px; background: var(--bg4); border: 1px solid var(--brd2); display: flex; align-items: center; justify-content: center; font-family: var(--ffh); font-size: 28px; color: var(--gold); flex-shrink: 0; overflow: hidden; }
.detail-cover img { width: 100%; height: 100%; object-fit: cover; }
.detail-info { flex: 1; }
.detail-info h2 { font-family: var(--ffh); font-size: 18px; color: var(--txt); font-style: italic; line-height: 1.3; margin-bottom: 6px; }
.detail-info .author { color: var(--gold); font-size: 14px; margin-bottom: 10px; }
.meta-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 16px 0; }
.meta-item { background: var(--bg3); border-radius: 6px; padding: 10px; }
.meta-item label { font-size: 9px; color: var(--txt4); text-transform: uppercase; letter-spacing: .8px; display: block; margin-bottom: 4px; }
.meta-item span { font-size: 13px; color: var(--txt2); }
.ozet-box { background: var(--bg3); border-radius: 6px; padding: 12px; font-size: 12px; color: var(--txt3); line-height: 1.7; font-style: italic; margin: 12px 0; }
.star-row { display: flex; gap: 4px; margin: 8px 0; }
.star-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--txt4); transition: color .1s; }
.star-btn.on { color: var(--gold); }

/* STATUS COLORS */
.s-okunacak { background: #2a3a2a44; color: #6aaa6a; border-color: #2a5a2a; }
.s-okunuyor { background: #2a2a3a44; color: #6a8aaa; border-color: #2a3a5a; }
.s-okundu   { background: #3a2a1a44; color: #aa8a4a; border-color: #5a3a1a; }
.dot-okunacak { background: #5a9a5a; }
.dot-okunuyor { background: #5a7aaa; }
.dot-okundu   { background: #aa8a4a; }

/* TOAST */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg3);
  border: 1px solid var(--brd2);
  border-radius: 8px;
  padding: 12px 18px;
  font-size: 13px;
  color: var(--txt2);
  z-index: 9999;
  display: none;
  animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

/* EMPTY */
.empty { text-align: center; padding: 60px 20px; color: var(--txt4); }
.empty .ico { font-size: 48px; margin-bottom: 12px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--brd2); border-radius: 3px; }



/* GRAFİK */
.chart-wrap { margin-bottom: 32px; }
.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; padding: 0 4px; }
.bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.bar-fill { width: 100%; background: var(--gold); border-radius: 3px 3px 0 0; transition: height .4s; min-height: 2px; }
.bar-label { font-size: 10px; color: var(--txt4); white-space: nowrap; }
.bar-val { font-size: 10px; color: var(--txt3); }

/* OKUMA İLERLEMESİ */
.progress-wrap { margin-top: 4px; }
.progress-bar { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; margin: 4px 0 2px; }
.progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .3s; }
.progress-label { font-size: 9px; color: var(--txt4); }

/* SERİ GRUBU */
.serie-group { margin-bottom: 20px; }
.serie-header { 
  font-family: var(--ffh); font-size: 13px; color: var(--gold); font-style: italic;
  padding: 6px 0 8px; border-bottom: 1px solid var(--brd); margin-bottom: 12px;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
}
.serie-toggle { font-size: 10px; color: var(--txt4); }

/* NO RESULTS */
#no-results { display: none; }
</style>

  <meta name="description" content="Kişisel kütüphane takip uygulaması">
  <meta name="theme-color" content="#0a0907">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Kütüphanecim">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="logo">
    Kütüphanecim
    <span>Kişisel Kütüphane</span>
  </div>
  <div id="stats-bar">
    <div class="stat-item">
      <div class="stat-n" id="h-total">0</div>
      <div class="stat-l">Kitap</div>
    </div>
    <div class="stat-item">
      <div class="stat-n" id="h-read" style="color:var(--green)">0</div>
      <div class="stat-l">Okundu</div>
    </div>
    <div class="stat-item">
      <div class="stat-n" id="h-reading" style="color:var(--blue)">0</div>
      <div class="stat-l">Okunuyor</div>
    </div>
  </div>
  <div id="header-actions">
    <button class="btn primary" onclick="openAdd()">+ Kitap Ekle</button>
  </div>
</div>

<!-- NAV -->
<div id="nav">
  <div class="nav-item act" onclick="switchTab('kitaplik',this)">📚 Kitaplık</div>
  <div class="nav-item" onclick="switchTab('istatistik',this)">📊 İstatistik</div>
  <div class="nav-item" onclick="switchTab('rozetler',this)">🏆 Rozetler</div>
</div>

<!-- KİTAPLIK TAB -->
<div id="tab-kitaplik" class="tab act">
  <div id="lib-toolbar">
    <input id="search" type="text" placeholder="Kitap, yazar, not ara..." oninput="renderLib()">
    <select id="filter-tur" onchange="renderLib()">
      <option value="">Tüm Türler</option>
    </select>
    <select id="filter-donem" onchange="renderLib()">
      <option value="">Tüm Dönemler</option>
    </select>
    <select id="filter-status" onchange="renderLib()">
      <option value="">Tüm Durumlar</option>
      <option value="okunacak">Okunacak</option>
      <option value="okunuyor">Okunuyor</option>
      <option value="okundu">Okundu</option>
    </select>
    <select id="filter-serie" onchange="renderLib()">
      <option value="">Tüm Kitaplar</option>
      <option value="seri">Sadece Seriler</option>
      <option value="tek">Sadece Tekler</option>
    </select>
    <select id="sort-by" onchange="renderLib()">
      <option value="kitap">Ada Göre</option>
      <option value="yazar">Yazara Göre</option>
      <option value="yil">Yıla Göre</option>
      <option value="puan">Puana Göre</option>
    </select>
    <span id="count-label" style="font-size:12px;color:var(--txt4);margin-left:4px;"></span>
    <div style="flex:1"></div>
    <button class="btn" onclick="setView('shelf')" id="btn-shelf">⊞ Raf</button>
    <button class="btn" onclick="setView('list')" id="btn-list">☰ Liste</button>
  </div>
  <div id="lib-content">
    <div id="shelf-grid"></div>
    <table id="list-view" style="display:none"><thead><tr>
      <th onclick="sortBy('kitap')">Kitap</th>
      <th onclick="sortBy('yazar')">Yazar</th>
      <th onclick="sortBy('tur')">Tür</th>
      <th onclick="sortBy('donem')">Dönem</th>
      <th onclick="sortBy('yil')">Yıl</th>
      <th onclick="sortBy('sayfa')">Sayfa</th>
      <th>Durum</th>
      <th onclick="sortBy('puan')">Puan</th>
    </tr></thead><tbody id="list-body"></tbody></table>
    <div id="no-results" class="empty"><div class="ico">🔍</div>Sonuç bulunamadı.</div>
  </div>
</div>

<!-- İSTATİSTİK TAB -->
<div id="tab-istatistik" class="tab">
  <div id="stats-content">
    <div class="stats-grid" id="stats-cards"></div>
    <div class="chart-wrap">
      <div class="section-title">📅 Aylık Okuma (Son 12 Ay)</div>
      <div class="bar-chart" id="monthly-chart"></div>
    </div>
    <div class="chart-wrap">
      <div class="section-title">📊 Durum Dağılımı</div>
      <div class="bar-chart" id="status-chart"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;flex-wrap:wrap;">
      <div>
        <div class="section-title">✍️ En Çok Okunan Yazarlar</div>
        <div id="authors-list"></div>
      </div>
      <div>
        <div class="section-title">📂 Tür Dağılımı</div>
        <div class="tur-grid" id="tur-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ROZETLER TAB -->
<div id="tab-rozetler" class="tab">
  <div id="badges-content">
    <div class="badges-grid" id="badges-grid"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="modal-add" style="display:none" onclick="if(event.target===this)closeModal('modal-add')">
  <div class="modal">
    <h2 id="modal-title">Kitap Ekle</h2>
    <div class="form-row"><label>Kitap Adı *</label><input id="f-kitap" type="text"></div>
    <div class="form-row"><label>Yazar *</label><input id="f-yazar" type="text"></div>
    <div class="form-grid">
      <div class="form-row"><label>Yayınevi</label><input id="f-yayinevi" type="text"></div>
      <div class="form-row"><label>Sayfa</label><input id="f-sayfa" type="number"></div>
      <div class="form-row"><label>Yıl</label><input id="f-yil" type="number"></div>
      <div class="form-row"><label>Dil</label>
        <select id="f-dil">
          <option>Türkçe</option><option>İngilizce</option><option>Almanca</option><option>Diğer</option>
        </select>
      </div>
      <div class="form-row"><label>Tür</label>
        <select id="f-tur">
          <option>Tarih</option><option>Roman</option><option>Biyografi</option><option>Felsefe</option>
          <option>Bilim</option><option>Siyaset</option><option>Edebiyat</option><option>Diğer</option>
        </select>
      </div>
      <div class="form-row"><label>Dönem</label>
        <select id="f-donem">
          <option>Osmanlı (Genel)</option><option>Osmanlı (Kuruluş)</option><option>Osmanlı (Yükseliş)</option>
          <option>Osmanlı (Gerileme)</option><option>Osmanlı (Çöküş)</option>
          <option>Türk Tarihi (Genel)</option><option>Türk Tarihi (Cumhuriyet)</option>
          <option>İslam Tarihi</option><option>Roma</option><option>Antik Yunan</option>
          <option>Orta Çağ</option><option>Modern Tarih</option><option>Genel</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label>Durum</label>
      <select id="f-status">
        <option value="okunacak">Okunacak</option>
        <option value="okunuyor">Okunuyor</option>
        <option value="okundu">Okundu</option>
      </select>
    </div>
    <div class="form-row"><label>Puan (0-10)</label><input id="f-puan" type="number" min="0" max="10"></div>
    <div class="form-row"><label>Not</label><textarea id="f-not" rows="2"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-add')">İptal</button>
      <button class="btn primary" onclick="saveBook()">Kaydet</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-detail" style="display:none" onclick="if(event.target===this)closeModal('modal-detail')">
  <div class="modal">
    <div class="detail-header">
      <div class="detail-cover" id="d-cover"></div>
      <div class="detail-info">
        <h2 id="d-kitap"></h2>
        <div class="author" id="d-yazar"></div>
        <div id="d-star-row" class="star-row"></div>
        <div>
          <span class="bdg" id="d-status-bdg"></span>
        </div>
      </div>
    </div>
    <div class="meta-grid">
      <div class="meta-item"><label>Yayınevi</label><span id="d-yayinevi"></span></div>
      <div class="meta-item"><label>Sayfa</label><span id="d-sayfa"></span></div>
      <div class="meta-item"><label>Yıl</label><span id="d-yil"></span></div>
      <div class="meta-item"><label>Tür</label><span id="d-tur"></span></div>
      <div class="meta-item"><label>Dönem</label><span id="d-donem"></span></div>
      <div class="meta-item"><label>Dil</label><span id="d-dil"></span></div>
    </div>
    <div id="d-not-box" class="ozet-box" style="display:none"></div>
    <div id="d-ilerleme-wrap" style="display:none;margin:12px 0;background:var(--bg3);border-radius:8px;padding:12px">
      <div style="font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Okuma İlerlemesi</div>
      <div style="display:flex;align-items:center;gap:10px">
        <input type="number" id="d-ilerleme-inp" placeholder="Okunan sayfa" style="width:140px" oninput="updateIlerleme()">
        <span id="d-ilerleme-label" style="font-size:12px;color:var(--txt4)"></span>
      </div>
      <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" id="d-ilerleme-bar" style="width:0%"></div></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">
      <button class="btn primary" onclick="editCurrent()">✏️ Düzenle</button>
      <button class="btn" onclick="quickStatus('okunuyor')">▶ Okunuyor</button>
      <button class="btn" onclick="quickStatus('okundu')">✓ Okundu</button>
      <div style="flex:1"></div>
      <button class="btn danger" onclick="deleteCurrent()">Sil</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>


// ── TÜR RENKLERİ ─────────────────────────────────────────────────────────────
const TUR_COLORS = {
  'Tarih':      ['#2a1e08','#c9a84c'],
  'Roman':      ['#0a1e2a','#4a8ac9'],
  'Biyografi':  ['#1a0a2a','#9a5ac9'],
  'Felsefe':    ['#0a2a1a','#4a9a6a'],
  'Bilim':      ['#0a1a2a','#4a7aaa'],
  'Siyaset':    ['#2a0a0a','#c94a4a'],
  'Edebiyat':   ['#1a1a0a','#9a9a3a'],
  'Diğer':      ['#1a1a1a','#7a7a7a'],
};
function turColor(tur) {
  return TUR_COLORS[tur] || ['#1a1a1a','#7a7a7a'];
}

// ── KAPAK RENKLERİ ─────────────────────────────────────────────────────────
const COVER_COLORS = [
  ['#4a2a1a','#c97a3a'], ['#1a2a4a','#4a8ac9'], ['#1a3a2a','#4a9a6a'],
  ['#3a1a3a','#9a5a9a'], ['#2a2a1a','#9a8a3a'], ['#1a1a3a','#5a5ac9'],
  ['#3a2a1a','#c97a4a'], ['#1a3a3a','#4a9a9a'], ['#3a1a1a','#c94a4a'],
  ['#2a1a3a','#7a5ac9'],
];
function coverColor(str) {
  let h = 0;
  for (let i=0; i<str.length; i++) h = (h*31 + str.charCodeAt(i)) & 0xffffffff;
  return COVER_COLORS[Math.abs(h) % COVER_COLORS.length];
}

// ── SERİ TESPİTİ ─────────────────────────────────────────────────────────────
function getSerieName(kitap) {
  // "Cilt X", "Bölüm X", "Kitap X", "Vol. X" gibi kalıpları bul
  const m = kitap.match(/^(.*?)\s+(Cilt|Bölüm|Kitap|Vol\.?|Kısım|Fasikül)\s+\d+/i);
  if (m) return m[1].trim();
  // Parantez içinde numara: "Başlık (1)"
  const m2 = kitap.match(/^(.*?)\s*\(\d+\)$/);
  if (m2) return m2[1].trim();
  return null;
}

function groupBySerie(books) {
  const groups = {};
  const singles = [];
  books.forEach(b => {
    const serie = getSerieName(b.kitap||'');
    if (serie && books.filter(x => getSerieName(x.kitap||'') === serie).length > 1) {
      if (!groups[serie]) groups[serie] = [];
      groups[serie].push(b);
    } else {
      singles.push(b);
    }
  });
  return {groups, singles};
}

// ── OKUMA İLERLEMESİ ─────────────────────────────────────────────────────────
function getIlerleme(id) {
  try { return JSON.parse(localStorage.getItem('kl_ilerleme') || '{}'); } catch(e) { return {}; }
}
function saveIlerleme(data) { localStorage.setItem('kl_ilerleme', JSON.stringify(data)); }

// ── VERİ ──────────────────────────────────────────────────────────────────────
const SK = 'kl_books_v1';
const SK_OLD = 'kp_local_books_v4';

const DEFAULT_BOOKS = []

function load() {
  let books = null;
  try { books = JSON.parse(localStorage.getItem(SK)); } catch(e){}
  if (!books) {
    // Eski key'den migrate et
    try { books = JSON.parse(localStorage.getItem(SK_OLD)); } catch(e){}
  }
  if (!books || !books.length) books = DEFAULT_BOOKS.map(b => ({...b}));
  return books;
}
function save(books) { localStorage.setItem(SK, JSON.stringify(books)); }
function genId() { return Math.random().toString(36).slice(2,10); }

let BOOKS = load();
let currentView = 'shelf';
let currentSort = {k:'kitap', d:'asc'};
let editingId = null;
let detailId = null;


// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display = 'none', 2500);
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('act'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('act'));
  document.getElementById('tab-' + id).classList.add('act');
  el.classList.add('act');
  if (id === 'istatistik') renderStats();
  if (id === 'rozetler') renderBadges();
}

// ── VIEW ──────────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('shelf-grid').style.display = v === 'shelf' ? 'grid' : 'none';
  document.getElementById('list-view').style.display = v === 'list' ? 'table' : 'none';
  document.getElementById('btn-shelf').style.borderColor = v === 'shelf' ? 'var(--gold)' : '';
  document.getElementById('btn-list').style.borderColor = v === 'list' ? 'var(--gold)' : '';
  renderLib();
}

// ── FİLTRELER ─────────────────────────────────────────────────────────────────
function buildFilters() {
  const turSel = document.getElementById('filter-tur');
  const donemSel = document.getElementById('filter-donem');
  const curTur = turSel.value;
  const curDonem = donemSel.value;

  const turler = [...new Set(BOOKS.map(b => b.tur).filter(Boolean))].sort();
  const donemler = [...new Set(BOOKS.map(b => b.donem).filter(Boolean))].sort();

  turSel.innerHTML = '<option value="">Tüm Türler</option>' +
    turler.map(t => `<option value="${t}" ${t===curTur?'selected':''}>${t}</option>`).join('');
  donemSel.innerHTML = '<option value="">Tüm Dönemler</option>' +
    donemler.map(d => `<option value="${d}" ${d===curDonem?'selected':''}>${d}</option>`).join('');
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const tur = document.getElementById('filter-tur').value;
  const donem = document.getElementById('filter-donem').value;
  const status = document.getElementById('filter-status').value;
  const sk = document.getElementById('sort-by').value;

  let books = BOOKS.filter(b => {
    if (q && !((b.kitap||'').toLowerCase().includes(q) ||
               (b.yazar||'').toLowerCase().includes(q) ||
               (b.not||'').toLowerCase().includes(q))) return false;
    if (tur && b.tur !== tur) return false;
    if (donem && b.donem !== donem) return false;
    if (status && b.status !== status) return false;
    const serieFilter = document.getElementById('filter-serie').value;
    if (serieFilter === 'seri' && !getSerieName(b.kitap||'')) return false;
    if (serieFilter === 'tek' && getSerieName(b.kitap||'')) return false;
    return true;
  });

  books.sort((a,b) => {
    let av = a[currentSort.k] || '';
    let bv = b[currentSort.k] || '';
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return currentSort.d === 'asc' ? -1 : 1;
    if (av > bv) return currentSort.d === 'asc' ? 1 : -1;
    return 0;
  });

  return books;
}

function sortBy(k) {
  if (currentSort.k === k) currentSort.d = currentSort.d === 'asc' ? 'desc' : 'asc';
  else currentSort = {k, d:'asc'};
  document.getElementById('sort-by').value = k;
  renderLib();
}

// ── RENDER LİBRARY ────────────────────────────────────────────────────────────
function renderLib() {
  buildFilters();
  updateHeader();
  const books = getFiltered();
  document.getElementById('count-label').textContent = books.length + ' / ' + BOOKS.length;

  const noRes = document.getElementById('no-results');
  noRes.style.display = books.length === 0 ? 'block' : 'none';

  if (currentView === 'shelf') renderShelf(books);
  else renderList(books);
}

function statusColor(s) {
  return s === 'okundu' ? '#aa8a4a' : s === 'okunuyor' ? '#5a7aaa' : '#5a9a5a';
}

function starStr(puan) {
  if (!puan) return '';
  return '★'.repeat(Math.round(puan/2));
}

function bookCardHtml(b) {
  const letter = (b.kitap||'?')[0];
  const dot = `<div class="status-dot" style="background:${statusColor(b.status)}"></div>`;
  const [bg, fg] = coverColor(b.kitap||'');
  let coverHtml;
  if (b.cover) {
    coverHtml = `<img src="${b.cover}" alt="" onerror="this.parentElement.style.background='${bg}';this.style.display='none'">`;
  } else {
    coverHtml = letter;
  }

  // Okuma ilerlemesi
  let progressHtml = '';
  if (b.status === 'okunuyor' && b.sayfa) {
    const ilerleme = getIlerleme();
    const okunan = ilerleme[b.id] || 0;
    const pct = Math.min(100, Math.round(okunan / b.sayfa * 100));
    progressHtml = `<div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${okunan}/${b.sayfa} sayfa</div>
    </div>`;
  }

  // Seri rozeti
  const serie = getSerieName(b.kitap||'');
  const serieHtml = serie ? `<div style="font-size:9px;color:var(--blue);background:#1a2a3a;border:1px solid #2a3a5a;border-radius:10px;padding:1px 7px;margin-top:2px">📚 Seri</div>` : '';

  // Tür rozeti
  const [tBg, tFg] = turColor(b.tur||'');
  const turHtml = b.tur ? `<div style="font-size:9px;color:${tFg};background:${tBg};border:1px solid ${tFg}44;border-radius:10px;padding:1px 7px;">${b.tur}</div>` : '';

  return `<div class="book-card" onclick="openDetail('${b.id}')">
    ${dot}
    <div class="book-cover" style="background:${bg};color:${fg}">${coverHtml}</div>
    <div class="book-title">${b.kitap||''}</div>
    <div class="book-author">${b.yazar||''}</div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center">${turHtml}${serieHtml}</div>
    ${progressHtml}
  </div>`;
}

function renderShelf(books) {
  const grid = document.getElementById('shelf-grid');
  if (books.length === 0) { grid.innerHTML = ''; return; }
  grid.innerHTML = books.map(b => bookCardHtml(b)).join('');
}

function renderList(books) {
  const tbody = document.getElementById('list-body');
  if (books.length === 0) { tbody.innerHTML = ''; return; }
  tbody.innerHTML = books.map(b => {
    const sc = b.status === 'okundu' ? 's-okundu' : b.status === 'okunuyor' ? 's-okunuyor' : 's-okunacak';
    const sl = b.status === 'okundu' ? 'Okundu' : b.status === 'okunuyor' ? 'Okunuyor' : 'Okunacak';
    return `<tr onclick="openDetail('${b.id}')" style="cursor:pointer">
      <td>${b.kitap||''}</td>
      <td>${b.yazar||''}</td>
      <td>${b.tur||''}</td>
      <td style="font-size:11px;color:var(--txt4)">${b.donem||''}</td>
      <td>${b.yil||'—'}</td>
      <td>${b.sayfa||'—'}</td>
      <td><span class="bdg ${sc}">${sl}</span></td>
      <td style="color:var(--gold)">${b.puan ? b.puan + '/10' : '—'}</td>
    </tr>`;
  }).join('');
}

function updateHeader() {
  document.getElementById('h-total').textContent = BOOKS.length;
  document.getElementById('h-read').textContent = BOOKS.filter(b=>b.status==='okundu').length;
  document.getElementById('h-reading').textContent = BOOKS.filter(b=>b.status==='okunuyor').length;
}

// ── DETAIL MODAL ──────────────────────────────────────────────────────────────
function openDetail(id) {
  const b = BOOKS.find(x => x.id === id);
  if (!b) return;
  detailId = id;

  const sc = b.status === 'okundu' ? 's-okundu' : b.status === 'okunuyor' ? 's-okunuyor' : 's-okunacak';
  const sl = b.status === 'okundu' ? 'Okundu' : b.status === 'okunuyor' ? 'Okunuyor' : 'Okunacak';

  document.getElementById('d-kitap').textContent = b.kitap || '';
  document.getElementById('d-yazar').textContent = b.yazar || '';
  document.getElementById('d-yayinevi').textContent = b.yayinevi || '—';
  document.getElementById('d-sayfa').textContent = b.sayfa || '—';
  document.getElementById('d-yil').textContent = b.yil || '—';
  document.getElementById('d-tur').textContent = b.tur || '—';
  document.getElementById('d-donem').textContent = b.donem || '—';
  document.getElementById('d-dil').textContent = b.dil || '—';
  document.getElementById('d-status-bdg').className = 'bdg ' + sc;
  document.getElementById('d-status-bdg').textContent = sl;

  const coverEl = document.getElementById('d-cover');
  if (b.cover) coverEl.innerHTML = `<img src="${b.cover}" alt="">`;
  else coverEl.textContent = (b.kitap||'?')[0];

  const notBox = document.getElementById('d-not-box');
  if (b.not) { notBox.textContent = b.not; notBox.style.display = 'block'; }
  else notBox.style.display = 'none';

  // Yıldızlar
  const starRow = document.getElementById('d-star-row');
  starRow.innerHTML = '';
  for (let i=1; i<=10; i++) {
    const btn = document.createElement('button');
    btn.className = 'star-btn' + (b.puan >= i ? ' on' : '');
    btn.textContent = '★';
    btn.onclick = (e) => { e.stopPropagation(); setPuan(id, i); };
    starRow.appendChild(btn);
  }

  // Okuma ilerlemesi
  const ilWrap = document.getElementById('d-ilerleme-wrap');
  if (b.status === 'okunuyor' && b.sayfa) {
    ilWrap.style.display = 'block';
    const ilerleme = getIlerleme();
    const okunan = ilerleme[id] || 0;
    document.getElementById('d-ilerleme-inp').value = okunan || '';
    document.getElementById('d-ilerleme-label').textContent = b.sayfa + ' sayfadan';
    const pct = Math.min(100, Math.round(okunan / b.sayfa * 100));
    document.getElementById('d-ilerleme-bar').style.width = pct + '%';
  } else {
    ilWrap.style.display = 'none';
  }

  document.getElementById('modal-detail').style.display = 'flex';
}

function updateIlerleme() {
  const b = BOOKS.find(x => x.id === detailId);
  if (!b || !b.sayfa) return;
  const okunan = parseInt(document.getElementById('d-ilerleme-inp').value) || 0;
  const il = getIlerleme();
  il[detailId] = Math.min(okunan, b.sayfa);
  saveIlerleme(il);
  const pct = Math.min(100, Math.round(il[detailId] / b.sayfa * 100));
  document.getElementById('d-ilerleme-bar').style.width = pct + '%';
  document.getElementById('d-ilerleme-label').textContent = b.sayfa + ' sayfadan — %' + pct;
  renderLib();
}

function setPuan(id, puan) {
  const b = BOOKS.find(x => x.id === id);
  if (!b) return;
  b.puan = b.puan === puan ? 0 : puan;
  save(BOOKS);
  openDetail(id);
  renderLib();
}

function quickStatus(status) {
  const b = BOOKS.find(x => x.id === detailId);
  if (!b) return;
  b.status = status;
  save(BOOKS);
  openDetail(detailId);
  renderLib();
  toast('Durum güncellendi');
}

function editCurrent() {
  closeModal('modal-detail');
  openEdit(detailId);
}

function deleteCurrent() {
  if (!confirm('Bu kitabı silmek istediğinizden emin misiniz?')) return;
  BOOKS = BOOKS.filter(b => b.id !== detailId);
  save(BOOKS);
  closeModal('modal-detail');
  renderLib();
  toast('Kitap silindi');
}

// ── ADD / EDIT MODAL ──────────────────────────────────────────────────────────
function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Kitap Ekle';
  ['kitap','yazar','yayinevi','not'].forEach(f => document.getElementById('f-'+f).value = '');
  ['sayfa','yil','puan'].forEach(f => document.getElementById('f-'+f).value = '');
  document.getElementById('f-dil').value = 'Türkçe';
  document.getElementById('f-tur').value = 'Tarih';
  document.getElementById('f-donem').value = 'Osmanlı (Genel)';
  document.getElementById('f-status').value = 'okunacak';
  document.getElementById('modal-add').style.display = 'flex';
  setTimeout(() => document.getElementById('f-kitap').focus(), 100);
}

function openEdit(id) {
  editingId = id;
  const b = BOOKS.find(x => x.id === id);
  if (!b) return;
  document.getElementById('modal-title').textContent = 'Kitabı Düzenle';
  document.getElementById('f-kitap').value = b.kitap || '';
  document.getElementById('f-yazar').value = b.yazar || '';
  document.getElementById('f-yayinevi').value = b.yayinevi || '';
  document.getElementById('f-sayfa').value = b.sayfa || '';
  document.getElementById('f-yil').value = b.yil || '';
  document.getElementById('f-puan').value = b.puan || '';
  document.getElementById('f-not').value = b.not || '';
  document.getElementById('f-dil').value = b.dil || 'Türkçe';
  document.getElementById('f-tur').value = b.tur || 'Tarih';
  document.getElementById('f-donem').value = b.donem || 'Genel';
  document.getElementById('f-status').value = b.status || 'okunacak';
  document.getElementById('modal-add').style.display = 'flex';
}

function saveBook() {
  const kitap = document.getElementById('f-kitap').value.trim();
  const yazar = document.getElementById('f-yazar').value.trim();
  if (!kitap || !yazar) { toast('Kitap adı ve yazar zorunlu'); return; }

  const data = {
    kitap, yazar,
    yayinevi: document.getElementById('f-yayinevi').value.trim(),
    sayfa: parseInt(document.getElementById('f-sayfa').value) || 0,
    yil: parseInt(document.getElementById('f-yil').value) || 0,
    puan: parseInt(document.getElementById('f-puan').value) || 0,
    not: document.getElementById('f-not').value.trim(),
    dil: document.getElementById('f-dil').value,
    tur: document.getElementById('f-tur').value,
    donem: document.getElementById('f-donem').value,
    status: document.getElementById('f-status').value,
    cover: ''
  };

  if (editingId) {
    const idx = BOOKS.findIndex(b => b.id === editingId);
    if (idx !== -1) BOOKS[idx] = {...BOOKS[idx], ...data};
    toast('Kitap güncellendi ✓');
  } else {
    data.id = genId();
    BOOKS.push(data);
    toast('Kitap eklendi ✓');
  }

  save(BOOKS);
  closeModal('modal-add');
  renderLib();
  renderBadges();
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// ── İSTATİSTİK ────────────────────────────────────────────────────────────────
function renderStats() {
  const total = BOOKS.length;
  const okundu = BOOKS.filter(b=>b.status==='okundu').length;
  const okunuyor = BOOKS.filter(b=>b.status==='okunuyor').length;
  const okunacak = BOOKS.filter(b=>b.status==='okunacak').length;
  const puanlı = BOOKS.filter(b=>b.puan>0);
  const ort = puanlı.length ? (puanlı.reduce((a,b)=>a+b.puan,0)/puanlı.length).toFixed(1) : '—';
  const sayfaToplam = BOOKS.filter(b=>b.status==='okundu').reduce((a,b)=>a+(b.sayfa||0),0);

  document.getElementById('stats-cards').innerHTML = [
    ['Toplam Kitap', total, 'var(--gold)'],
    ['Okundu', okundu, 'var(--green)'],
    ['Okunuyor', okunuyor, 'var(--blue)'],
    ['Okunacak', okunacak, 'var(--txt3)'],
    ['Ort. Puan', ort, 'var(--gold)'],
    ['Okunan Sayfa', sayfaToplam.toLocaleString('tr-TR'), 'var(--gold2)'],
  ].map(([l,v,c]) => `<div class="stat-card">
    <div class="big" style="color:${c}">${v}</div>
    <div class="lbl">${l}</div>
  </div>`).join('');

  // Yazarlar
  const yazarMap = {};
  BOOKS.forEach(b => { if(b.yazar) yazarMap[b.yazar] = (yazarMap[b.yazar]||0)+1; });
  const yazarlar = Object.entries(yazarMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxY = yazarlar[0]?.[1] || 1;
  document.getElementById('authors-list').innerHTML = yazarlar.map(([y,n],i) =>
    `<div class="author-row">
      <div class="author-rank">${i+1}</div>
      <div class="author-name">${y}</div>
      <div class="author-count">${n}</div>
      <div class="pbar"><div class="pfill" style="width:${n/maxY*100}%"></div></div>
    </div>`
  ).join('');

  // Türler
  const turMap = {};
  BOOKS.forEach(b => { if(b.tur) turMap[b.tur] = (turMap[b.tur]||0)+1; });
  document.getElementById('tur-list').innerHTML = Object.entries(turMap)
    .sort((a,b)=>b[1]-a[1])
    .map(([t,n]) => `<div class="tur-item"><div class="tur-name">${t}</div><div class="tur-n">${n}</div></div>`)
    .join('');

  // Aylık okuma grafiği — yıl alanına göre (gerçek tarih yok, yıl kullanıyoruz)
  // Son 8 yılı göster
  const yilMap = {};
  BOOKS.filter(b=>b.status==='okundu'&&b.yil>0).forEach(b => {
    yilMap[b.yil] = (yilMap[b.yil]||0)+1;
  });
  const yillar = Object.keys(yilMap).map(Number).sort();
  const son8 = yillar.slice(-8);
  const maxY2 = Math.max(...son8.map(y=>yilMap[y]||0), 1);
  const monthEl = document.getElementById('monthly-chart');
  if (son8.length > 0) {
    monthEl.innerHTML = son8.map(y => {
      const n = yilMap[y]||0;
      const h = Math.round(n/maxY2*140);
      return `<div class="bar-col">
        <div class="bar-val">${n}</div>
        <div class="bar-fill" style="height:${h}px"></div>
        <div class="bar-label">${y}</div>
      </div>`;
    }).join('');
  } else {
    monthEl.innerHTML = '<div style="color:var(--txt4);font-size:12px;padding:20px">Yıl bilgisi olan okundu kitabı yok</div>';
  }

  // Durum grafiği
  const statusData = [
    ['Okundu', okundu, 'var(--gold)'],
    ['Okunuyor', okunuyor, 'var(--blue)'],
    ['Okunacak', okunacak, 'var(--txt3)'],
  ];
  const maxS = Math.max(...statusData.map(s=>s[1]), 1);
  document.getElementById('status-chart').innerHTML = statusData.map(([l,n,c]) => {
    const h = Math.round(n/maxS*140);
    return `<div class="bar-col" style="max-width:100px">
      <div class="bar-val" style="color:${c}">${n}</div>
      <div class="bar-fill" style="height:${h}px;background:${c}"></div>
      <div class="bar-label">${l}</div>
    </div>`;
  }).join('');
}

  {id:'b2', ico:'📚', name:'Okuyucu', desc:'10 kitap oku', cond: b => b.filter(x=>x.status==='okundu').length >= 10},
  {id:'b3', ico:'🏛️', name:'Bibliyofil', desc:'25 kitap oku', cond: b => b.filter(x=>x.status==='okundu').length >= 25},
  {id:'b4', ico:'🎓', name:'Akademisyen', desc:'50 kitap oku', cond: b => b.filter(x=>x.status==='okundu').length >= 50},
  {id:'b5', ico:'👑', name:'Üstat', desc:'100 kitap oku', cond: b => b.filter(x=>x.status==='okundu').length >= 100},
  {id:'b6', ico:'⭐', name:'Eleştirmen', desc:'10 kitaba puan ver', cond: b => b.filter(x=>x.puan>0).length >= 10},
  {id:'b7', ico:'🗂️', name:'Koleksiyoncu', desc:'50 kitap ekle', cond: b => b.length >= 50},
  {id:'b8', ico:'🏺', name:'Kütüphaneci', desc:'100 kitap ekle', cond: b => b.length >= 100},
  {id:'b9', ico:'⚔️', name:'Tarihçi', desc:'20 tarih kitabı oku', cond: b => b.filter(x=>x.tur==='Tarih'&&x.status==='okundu').length >= 20},
  {id:'b10', ico:'🌙', name:'Osmanlı Uzmanı', desc:'10 Osmanlı kitabı oku', cond: b => b.filter(x=>(x.donem||'').includes('Osmanlı')&&x.status==='okundu').length >= 10},
  {id:'b11', ico:'✏️', name:'Notlu Okuyucu', desc:'5 kitaba not ekle', cond: b => b.filter(x=>x.not&&x.not.length>0).length >= 5},
  {id:'b12', ico:'📰', name:'Çok Dilli', desc:'3 farklı dilde kitap', cond: b => new Set(b.map(x=>x.dil).filter(Boolean)).size >= 3},
];

function renderBadges() {
  document.getElementById('badges-grid').innerHTML = BADGES.map(badge => {
    const earned = badge.cond(BOOKS);
    return `<div class="badge-card ${earned?'earned':''}">
      <div class="badge-icon">${badge.ico}</div>
      <div class="badge-name">${badge.name}</div>
      <div class="badge-desc">${badge.desc}</div>
    </div>`;
  }).join('');
}
